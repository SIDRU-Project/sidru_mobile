# Compila SIDRU para iOS en un runner macOS de GitHub Actions (no necesitas Mac).
# Produce un IPA SIN FIRMAR como artefacto descargable.
#   • Para instalarlo en un iPhone real necesitas firmarlo (cuenta Apple Developer)
#     o sideloadearlo con AltStore/Sideloadly (re-firma con un Apple ID gratis, 7 días).
#   • Lánzalo manualmente desde la pestaña "Actions" → "iOS Build (unsigned)" → Run workflow.
name: iOS Build (unsigned)

on:
  workflow_dispatch: {}            # ejecución manual desde la UI de GitHub
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'pubspec.yaml'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      # El .env está en .gitignore, así que el repo no lo trae: lo creamos para el build.
      - name: Crear .env
        run: |
          cat > .env <<'EOF'
          API_BASE_URL=http://sidru-209313030.eastus2.cloudapp.azure.com:8080/api/v1
          APP_NAME=SIDRU
          EOF

      # Firebase (firebase_core/messaging) exige iOS 13+.
      - name: Fijar deployment target iOS 13
        run: |
          cd ios
          sed -i '' "s/# *platform :ios, '[0-9.]*'/platform :ios, '13.0'/" Podfile || true

      - name: Dependencias
        run: flutter pub get

      - name: Build iOS (sin firma)
        run: flutter build ios --release --no-codesign

      # Empaqueta Runner.app en un IPA sin firmar (formato Payload/).
      - name: Empaquetar IPA sin firmar
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r -q "$GITHUB_WORKSPACE/sidru-unsigned.ipa" Payload

      - name: Subir artefacto IPA
        uses: actions/upload-artifact@v4
        with:
          name: sidru-ios-unsigned-ipa
          path: sidru-unsigned.ipa
          if-no-files-found: error
