name: sidru_mobile
description: SIDRU - Sistema de Incentivos Digitales para el Reciclaje Urbano

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.4.3+1

  # Secure storage for JWT
  flutter_secure_storage: ^9.2.2

  # Non-sensitive preferences
  shared_preferences: ^2.2.3

  # QR scanner (Phase 6)
  mobile_scanner: ^5.1.0

  # Internationalization and date formatting
  intl: ^0.19.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Remote images (Phase 8)
  cached_network_image: ^3.3.1

  # Open external links (explorador Polygonscan — RF-19)
  url_launcher: ^6.3.0

  # Models: immutable classes + JSON serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation for freezed + json_serializable
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Generación del ícono de la app y la splash a partir del logo
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

# ── Ícono de la app (genera mipmaps Android + assets iOS desde el logo) ──
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_legacy.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  remove_alpha_ios: true
  background_color_ios: "#0A0E1A"

# ── Splash de arranque (logo sobre el azul de marca) ──
flutter_native_splash:
  color: "#0A0E1A"
  image: assets/images/logo_mark.png
  android_12:
    color: "#0A0E1A"
    image: assets/images/logo_mark.png
